<!DOCTYPE html>
<html lang="es">

<head>

<!-- ================= META ================= -->

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Control de Horas</title>

<!-- ================= ESTILOS ================= -->

<style>

*{
box-sizing:border-box;
font-family:system-ui,-apple-system;
}

html,body{
margin:0;
max-width:100%;
overflow-x:hidden;
background:#f4f6fb;
color:#111;
transition:.3s;
line-height:1.4;
}

.dark{
background:#0f172a;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:30px 20px;
width:100%;
}

/* ---------- HEADER ---------- */

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
width:100%;
}

h1{
margin:0;
font-size:24px;
font-weight:700;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

/* ---------- BOTONES ---------- */

button{
padding:12px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
font-size:14px;
transition:.2s;
}

button:hover{
opacity:.9;
}

.primary{
background:#4f46e5;
color:white;
}

.secondary{
background:#e5e7eb;
}

.danger{
background:#ef4444;
color:white;
}

.dark .secondary{
background:#334155;
color:white;
}

/* ---------- TARJETAS ---------- */

.card{
background:white;
padding:22px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.dark .card{
background:#1e293b;
}

/* ---------- INPUTS ---------- */

label{
font-weight:600;
font-size:14px;
display:block;
margin-bottom:4px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:12px;
font-size:16px;
}

/* ---------- GRID FORM ---------- */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:10px;
}

/* ---------- TABLA ---------- */

.table-wrap{
width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
margin-top:10px;
}

table{
width:100%;
min-width:450px;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
font-size:14px;
}

.dark th,.dark td{
border-bottom:1px solid #334155;
}

th{
background:#f1f5f9;
font-weight:600;
}

.dark th{
background:#334155;
}

.total{
text-align:right;
font-weight:700;
margin-top:15px;
font-size:16px;
}

/* ---------- LOGIN ---------- */

.center{
max-width:420px;
margin:auto;
margin-top:120px;
padding:25px;
}

.link{
color:#4f46e5;
cursor:pointer;
font-weight:600;
}

h2{
margin-top:0;
margin-bottom:15px;
}

/* ---------- RESPONSIVE ---------- */

@media (max-width:700px){

.header{
flex-direction:column;
align-items:flex-start;
}

.grid{
grid-template-columns:1fr;
}

button{
width:100%;
}

}

</style>

</head>

<body>

<!-- ================= LOGIN ================= -->

<div id="loginScreen" class="card center">

<h2>Iniciar sesión</h2>

<label>Nombre</label>
<input id="loginNombre">

<label>Apellido</label>
<input id="loginApellido">

<button class="primary" onclick="login()">Entrar</button>

<p>No tenés cuenta?
<span class="link" onclick="mostrarRegistro()">Registrarse</span>
</p>

</div>


<!-- ================= REGISTRO ================= -->

<div id="registerScreen" class="card center" style="display:none">

<h2>Crear cuenta</h2>

<label>Nombre</label>
<input id="regNombre">

<label>Apellido</label>
<input id="regApellido">

<button class="primary" onclick="registrar()">Registrarse</button>

<p>¿Ya tenés cuenta?
<span class="link" onclick="mostrarLogin()">Iniciar sesión</span>
</p>

</div>


<!-- ================= APLICACIÓN ================= -->

<div id="app" style="display:none">

<div class="container">

<!-- HEADER -->

<div class="header">

<h1>Control de Horas</h1>

<div class="actions">

<span id="usuario"></span>

<button class="secondary" onclick="toggleDark()">Modo</button>

<button class="secondary" onclick="borrarPerfil()">Borrar Perfil</button>

<button class="danger" onclick="logout()">Salir</button>

</div>

</div>


<!-- ================= CARGA DE HORAS ================= -->

<div class="card">

<h3>Cargar horas</h3>

<div class="grid">

<div>
<label>Fecha</label>
<input type="date" id="fecha">
</div>

<div>
<label>Hora de ingreso</label>
<input type="time" id="ingreso">
</div>

<div>
<label>Hora de egreso</label>
<input type="time" id="egreso">
</div>

</div>

<button class="primary" onclick="guardar()">Guardar registro</button>

</div>


<!-- ================= REGISTROS ================= -->

<div class="card">

<h3>Registros por mes</h3>

<label>Seleccionar mes</label>
<input type="month" id="selectorMes" onchange="mostrar()">

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Fecha</th>
<th>Ingreso</th>
<th>Egreso</th>
<th>Horas</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

<div class="total">
Total del mes: <span id="totalMes">0h 0m</span>
</div>
<button class="primary" onclick="exportarPDF()">
Exportar mes a PDF
</button>
</div>

</div>

</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

/* ---------- BASE DE DATOS LOCAL ---------- */

let registros=JSON.parse(localStorage.getItem("registros"))||[]
let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[]
let usuario=null

let hoy=new Date()
let mesActual=hoy.toISOString().slice(0,7)

/* ---------- FUNCIONES GENERALES ---------- */

function cap(t){
return t.charAt(0).toUpperCase()+t.slice(1).toLowerCase()
}

/* ---------- CAMBIO LOGIN / REGISTRO ---------- */

function mostrarRegistro(){
loginScreen.style.display="none"
registerScreen.style.display="block"
}

function mostrarLogin(){
registerScreen.style.display="none"
loginScreen.style.display="block"
}

/* ---------- REGISTRAR USUARIO ---------- */

function registrar(){

let n=cap(regNombre.value.trim())
let a=cap(regApellido.value.trim())

if(!n||!a){
alert("Completar datos")
return
}

let nombre=n+" "+a

if(usuarios.includes(nombre)){
alert("Ese usuario ya existe")
return
}

usuarios.push(nombre)

localStorage.setItem("usuarios",JSON.stringify(usuarios))

alert("Cuenta creada")

mostrarLogin()

}

/* ---------- LOGIN ---------- */

function login(){

let n=cap(loginNombre.value.trim())
let a=cap(loginApellido.value.trim())

let nombre=n+" "+a

if(!usuarios.includes(nombre)){
alert("Usuario no registrado")
return
}

usuario=nombre

localStorage.setItem("sesion",usuario)

iniciar()

}

/* ---------- INICIAR APP ---------- */

function iniciar(){

usuario=localStorage.getItem("sesion")

if(!usuario)return

loginScreen.style.display="none"
registerScreen.style.display="none"
app.style.display="block"

selectorMes.value=mesActual

document.getElementById("usuario").innerText="Usuario: "+usuario

mostrar()

}

/* ---------- CERRAR SESIÓN ---------- */

function logout(){
localStorage.removeItem("sesion")
location.reload()
}

/* ---------- CALCULO MINUTOS ---------- */

function minutos(h){
let p=h.split(":")
return p[0]*60+parseInt(p[1])
}

/* ---------- GUARDAR REGISTRO ---------- */

function guardar(){

let f=fecha.value
let i=ingreso.value
let e=egreso.value

if(!f||!i||!e){
alert("Completar datos")
return
}

let diff=minutos(e)-minutos(i)

if(diff<0) diff+=1440

let h=Math.floor(diff/60)
let m=diff%60

registros.push({usuario,f,i,e,h,m})

localStorage.setItem("registros",JSON.stringify(registros))

fecha.value=""
ingreso.value=""
egreso.value=""

mostrar()

}

/* ---------- BORRAR REGISTRO ---------- */

function borrar(i){

registros.splice(i,1)

localStorage.setItem("registros",JSON.stringify(registros))

mostrar()

}

/* ---------- MOSTRAR TABLA ---------- */

function mostrar(){

tabla.innerHTML=""

let total=0

let mesSeleccionado=selectorMes.value

registros.forEach((r,i)=>{

if(r.usuario!==usuario)return

let mesRegistro=r.f.slice(0,7)

if(mesRegistro!==mesSeleccionado)return

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.f}</td>
<td>${r.i}</td>
<td>${r.e}</td>
<td>${r.h}h ${r.m}m</td>
<td><button class="danger" onclick="borrar(${i})">Borrar</button></td>
`

tabla.appendChild(tr)

total+=r.h*60+r.m

})

let th=Math.floor(total/60)
let tm=total%60

totalMes.innerText=th+"h "+tm+"m"

}

/* ---------- BORRAR PERFIL ---------- */

function borrarPerfil(){

if(confirm("¿Seguro que querés eliminar tu cuenta?\nSe borrarán todos tus registros.")){

usuarios=usuarios.filter(u=>u!==usuario)
registros=registros.filter(r=>r.usuario!==usuario)

localStorage.setItem("usuarios",JSON.stringify(usuarios))
localStorage.setItem("registros",JSON.stringify(registros))

logout()

}

}

/* ---------- MODO OSCURO ---------- */

function toggleDark(){

document.body.classList.toggle("dark")

localStorage.setItem("dark",document.body.classList.contains("dark"))

}

if(localStorage.getItem("dark")=="true"){
document.body.classList.add("dark")
}

iniciar()
function exportarPDF(){

let mesSeleccionado=selectorMes.value

if(!mesSeleccionado){
alert("Seleccionar un mes")
return
}

let fecha=new Date(mesSeleccionado+"-01")

let nombreMes=fecha.toLocaleDateString("es-ES",{month:"long",year:"numeric"})

let tablaHTML=document.querySelector(".table-wrap").outerHTML

let totalTexto=document.getElementById("totalMes").innerText

let contenido=`
<div style="font-family:Arial;padding:20px">

<h2 style="text-align:center;margin-bottom:5px">
Historial de horas
</h2>

<h3 style="text-align:center;margin-top:0">
${usuario}
</h3>

<p style="text-align:center;margin-bottom:20px">
Mes: ${nombreMes}
</p>

${tablaHTML}

<h3 style="text-align:right;margin-top:20px">
Total del mes: ${totalTexto}
</h3>

</div>
`

let element=document.createElement("div")
element.innerHTML=contenido

html2pdf().set({
margin:10,
filename:`horas_${mesSeleccionado}.pdf`,
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
}).from(element).save()

}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
