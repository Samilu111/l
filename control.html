<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Control de Horas</title>

<style>

*{
box-sizing:border-box;
font-family:system-ui,-apple-system;
}

html,body{
margin:0;
max-width:100%;
overflow-x:hidden;
background:#f4f6fb;
color:#111;
transition:.3s;
line-height:1.4;
}

.dark{
background:#0f172a;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:30px 20px;
width:100%;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
width:100%;
}

h1{
margin:0;
font-size:24px;
font-weight:700;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
font-size:14px;
transition:.2s;
}

.primary{
background:#4f46e5;
color:white;
}

.secondary{
background:#e5e7eb;
}

.danger{
background:#ef4444;
color:white;
}

.card{
background:white;
padding:22px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.dark .card{
background:#1e293b;
}

label{
font-weight:600;
font-size:14px;
display:block;
margin-bottom:4px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:12px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:10px;
}

.table-wrap{
width:100%;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
font-size:14px;
}

th{
background:#f1f5f9;
font-weight:600;
}

.total{
text-align:right;
font-weight:700;
margin-top:15px;
font-size:16px;
}

.center{
max-width:420px;
margin:auto;
margin-top:120px;
padding:25px;
}

.link{
color:#4f46e5;
cursor:pointer;
font-weight:600;
}

@media (max-width:700px){

.header{
flex-direction:column;
align-items:flex-start;
}

.grid{
grid-template-columns:1fr;
}

button{
width:100%;
}

}

/* ===== PDF ===== */

#pdfArea{
display:none;
padding:40px;
font-family:Arial;
}

#pdfArea h2{
text-align:center;
margin-bottom:30px;
}

#pdfTabla{
width:100%;
border-collapse:collapse;
}

#pdfTabla th,
#pdfTabla td{
border:1px solid black;
padding:10px;
text-align:center;
}

#pdfTotal{
margin-top:25px;
text-align:right;
font-weight:bold;
font-size:18px;
}

@media print{

body *{
visibility:hidden;
}

#pdfArea,
#pdfArea *{
visibility:visible;
}

#pdfArea{
position:absolute;
top:0;
left:0;
width:100%;
}

}

</style>

</head>

<body>

<div id="loginScreen" class="card center">

<h2>Iniciar sesión</h2>

<label>Nombre</label>
<input id="loginNombre">

<label>Apellido</label>
<input id="loginApellido">

<button class="primary" onclick="login()">Entrar</button>

<p>No tenés cuenta?
<span class="link" onclick="mostrarRegistro()">Registrarse</span>
</p>

</div>

<div id="registerScreen" class="card center" style="display:none">

<h2>Crear cuenta</h2>

<label>Nombre</label>
<input id="regNombre">

<label>Apellido</label>
<input id="regApellido">

<button class="primary" onclick="registrar()">Registrarse</button>

<p>¿Ya tenés cuenta?
<span class="link" onclick="mostrarLogin()">Iniciar sesión</span>
</p>

</div>

<div id="app" style="display:none">

<div class="container">

<div class="header">

<h1>Control de Horas</h1>

<div class="actions">

<span id="usuario"></span>

<button class="secondary" onclick="toggleDark()">Modo</button>
<button class="secondary" onclick="borrarPerfil()">Borrar Perfil</button>
<button class="danger" onclick="logout()">Salir</button>

</div>

</div>

<div class="card">

<h3>Cargar horas</h3>

<div class="grid">

<div>
<label>Fecha</label>
<input type="date" id="fecha">
</div>

<div>
<label>Hora ingreso</label>
<input type="time" id="ingreso">
</div>

<div>
<label>Hora egreso</label>
<input type="time" id="egreso">
</div>

</div>

<button class="primary" onclick="guardar()">Guardar registro</button>

</div>

<div class="card">

<h3>Registros por mes</h3>

<label>Seleccionar mes</label>
<input type="month" id="selectorMes" onchange="mostrar()">

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Fecha</th>
<th>Ingreso</th>
<th>Egreso</th>
<th>Horas</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

<div class="total">
Total del mes: <span id="totalMes">0h 0m</span>
</div>

<button class="primary" onclick="generarPDF()">Exportar PDF del mes</button>

</div>

</div>

</div>

<!-- AREA PDF -->

<div id="pdfArea">

<h2 id="pdfMes"></h2>

<table id="pdfTabla">

<thead>
<tr>
<th>Fecha</th>
<th>Ingreso</th>
<th>Egreso</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div id="pdfTotal"></div>

</div>

<script>

let registros=JSON.parse(localStorage.getItem("registros"))||[]
let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[]
let usuario=null

let hoy=new Date()
let mesActual=hoy.toISOString().slice(0,7)

function cap(t){
return t.charAt(0).toUpperCase()+t.slice(1).toLowerCase()
}

function mostrarRegistro(){
loginScreen.style.display="none"
registerScreen.style.display="block"
}

function mostrarLogin(){
registerScreen.style.display="none"
loginScreen.style.display="block"
}

function registrar(){

let n=cap(regNombre.value.trim())
let a=cap(regApellido.value.trim())

if(!n||!a){
alert("Completar datos")
return
}

let nombre=n+" "+a

if(usuarios.includes(nombre)){
alert("Ese usuario ya existe")
return
}

usuarios.push(nombre)

localStorage.setItem("usuarios",JSON.stringify(usuarios))

alert("Cuenta creada")

mostrarLogin()

}

function login(){

let n=cap(loginNombre.value.trim())
let a=cap(loginApellido.value.trim())

let nombre=n+" "+a

if(!usuarios.includes(nombre)){
alert("Usuario no registrado")
return
}

usuario=nombre

localStorage.setItem("sesion",usuario)

iniciar()

}

function iniciar(){

usuario=localStorage.getItem("sesion")

if(!usuario)return

loginScreen.style.display="none"
registerScreen.style.display="none"
app.style.display="block"

selectorMes.value=mesActual

document.getElementById("usuario").innerText="Usuario: "+usuario

mostrar()

}

function logout(){
localStorage.removeItem("sesion")
location.reload()
}

function minutos(h){
let p=h.split(":")
return p[0]*60+parseInt(p[1])
}

function guardar(){

let f=fecha.value
let i=ingreso.value
let e=egreso.value

if(!f||!i||!e){
alert("Completar datos")
return
}

let diff=minutos(e)-minutos(i)

if(diff<0) diff+=1440

let h=Math.floor(diff/60)
let m=diff%60

registros.push({usuario,f,i,e,h,m})

localStorage.setItem("registros",JSON.stringify(registros))

fecha.value=""
ingreso.value=""
egreso.value=""

mostrar()

}

function borrar(i){

registros.splice(i,1)

localStorage.setItem("registros",JSON.stringify(registros))

mostrar()

}

function mostrar(){

tabla.innerHTML=""

let total=0
let mesSeleccionado=selectorMes.value

registros.forEach((r,i)=>{

if(r.usuario!==usuario)return
if(r.f.slice(0,7)!==mesSeleccionado)return

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.f}</td>
<td>${r.i}</td>
<td>${r.e}</td>
<td>${r.h}h ${r.m}m</td>
<td><button class="danger" onclick="borrar(${i})">Borrar</button></td>
`

tabla.appendChild(tr)

total+=r.h*60+r.m

})

let th=Math.floor(total/60)
let tm=total%60

totalMes.innerText=th+"h "+tm+"m"

}

/* PDF */

function generarPDF(){

let mes=selectorMes.value

if(!mes){
alert("Seleccioná un mes")
return
}

let fecha=new Date(mes+"-01")

let nombreMes=fecha.toLocaleDateString("es-ES",{month:"long",year:"numeric"})

pdfMes.innerText="Historial de horas - "+nombreMes

let cuerpo=document.querySelector("#pdfTabla tbody")

cuerpo.innerHTML=""

let total=0

registros.forEach(r=>{

if(r.usuario!==usuario)return
if(r.f.slice(0,7)!==mes)return

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.f}</td>
<td>${r.i}</td>
<td>${r.e}</td>
`

cuerpo.appendChild(tr)

total+=r.h*60+r.m

})

let h=Math.floor(total/60)
let m=total%60

pdfTotal.innerText="Total del mes: "+h+"h "+m+"m"

window.print()

}

function borrarPerfil(){

if(confirm("¿Seguro que querés eliminar tu cuenta?")){

usuarios=usuarios.filter(u=>u!==usuario)
registros=registros.filter(r=>r.usuario!==usuario)

localStorage.setItem("usuarios",JSON.stringify(usuarios))
localStorage.setItem("registros",JSON.stringify(registros))

logout()

}

}

function toggleDark(){

document.body.classList.toggle("dark")

localStorage.setItem("dark",document.body.classList.contains("dark"))

}

if(localStorage.getItem("dark")=="true"){
document.body.classList.add("dark")
}

iniciar()

</script>

</body>
</html>
