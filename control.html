<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Control de Horas</title>

<style>

*{
box-sizing:border-box;
font-family:system-ui,-apple-system;
}

html,body{
margin:0;
max-width:100%;
overflow-x:hidden;
background:#f4f6fb;
color:#111;
}

.container{
max-width:1000px;
margin:auto;
padding:30px 20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.primary{background:#4f46e5;color:white;}
.secondary{background:#e5e7eb;}
.danger{background:#ef4444;color:white;}

.card{
background:white;
padding:22px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

.table-wrap{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#f1f5f9;
}

.total{
text-align:right;
font-weight:bold;
margin-top:10px;
}

/* NO IMPRIMIR ACCIONES */

@media print{

.no-print{
display:none;
}

body{
background:white;
}

table{
font-size:14px;
}

}

</style>

</head>

<body>

<div id="loginScreen" class="card" style="max-width:400px;margin:100px auto">

<h2>Iniciar sesión</h2>

<input id="loginNombre" placeholder="Nombre">
<input id="loginApellido" placeholder="Apellido">

<button class="primary" onclick="login()">Entrar</button>

<p>No tenés cuenta?
<span onclick="mostrarRegistro()" style="color:blue;cursor:pointer">Registrarse</span>
</p>

</div>


<div id="registerScreen" class="card" style="display:none;max-width:400px;margin:100px auto">

<h2>Crear cuenta</h2>

<input id="regNombre" placeholder="Nombre">
<input id="regApellido" placeholder="Apellido">

<button class="primary" onclick="registrar()">Registrarse</button>

<p>¿Ya tenés cuenta?
<span onclick="mostrarLogin()" style="color:blue;cursor:pointer">Iniciar sesión</span>
</p>

</div>


<div id="app" style="display:none">

<div class="container">

<div class="header">

<h1>Control de Horas</h1>

<div>

<span id="usuario"></span>

<button class="secondary" onclick="borrarPerfil()">Borrar perfil</button>
<button class="danger" onclick="logout()">Salir</button>

</div>

</div>


<div class="card">

<h3>Cargar horas</h3>

<div class="grid">

<input type="date" id="fecha">
<input type="time" id="ingreso">
<input type="time" id="egreso">

</div>

<button class="primary" onclick="guardar()">Guardar registro</button>

</div>


<div class="card">

<h3>Registros por mes</h3>

<input type="month" id="selectorMes" onchange="mostrar()">

<div class="table-wrap">

<table id="tablaPDF">

<thead>

<tr>
<th>Fecha</th>
<th>Ingreso</th>
<th>Egreso</th>
<th>Horas</th>
<th class="no-print">Acción</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>

<div class="total">
Total del mes: <span id="totalMes">0h 0m</span>
</div>

<br>

<button class="primary no-print" onclick="exportarExcel()">Exportar Excel</button>

<button class="primary no-print" onclick="imprimirPDF()">Exportar PDF</button>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

let registros=JSON.parse(localStorage.getItem("registros"))||[]
let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[]
let usuario=null

let hoy=new Date()
let mesActual=hoy.toISOString().slice(0,7)

function cap(t){
return t.charAt(0).toUpperCase()+t.slice(1).toLowerCase()
}

function mostrarRegistro(){
loginScreen.style.display="none"
registerScreen.style.display="block"
}

function mostrarLogin(){
registerScreen.style.display="none"
loginScreen.style.display="block"
}

function registrar(){

let n=cap(regNombre.value.trim())
let a=cap(regApellido.value.trim())

if(!n||!a)return alert("Completar datos")

let nombre=n+" "+a

if(usuarios.includes(nombre))return alert("Usuario existe")

usuarios.push(nombre)

localStorage.setItem("usuarios",JSON.stringify(usuarios))

alert("Cuenta creada")

mostrarLogin()

}

function login(){

let n=cap(loginNombre.value.trim())
let a=cap(loginApellido.value.trim())

let nombre=n+" "+a

if(!usuarios.includes(nombre))return alert("Usuario no registrado")

usuario=nombre

localStorage.setItem("sesion",usuario)

iniciar()

}

function iniciar(){

usuario=localStorage.getItem("sesion")

if(!usuario)return

loginScreen.style.display="none"
registerScreen.style.display="none"
app.style.display="block"

selectorMes.value=mesActual

document.getElementById("usuario").innerText="Usuario: "+usuario

mostrar()

}

function logout(){
localStorage.removeItem("sesion")
location.reload()
}

function minutos(h){
let p=h.split(":")
return p[0]*60+parseInt(p[1])
}

function guardar(){

let f=fecha.value
let i=ingreso.value
let e=egreso.value

if(!f||!i||!e)return alert("Completar datos")

let diff=minutos(e)-minutos(i)

if(diff<0) diff+=1440

let h=Math.floor(diff/60)
let m=diff%60

registros.push({usuario,f,i,e,h,m})

localStorage.setItem("registros",JSON.stringify(registros))

mostrar()

}

function mostrar(){

tabla.innerHTML=""

let total=0

let mesSeleccionado=selectorMes.value

registros.forEach((r,index)=>{

if(r.usuario!==usuario)return

if(r.f.slice(0,7)!==mesSeleccionado)return

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${r.f}</td>
<td>${r.i}</td>
<td>${r.e}</td>
<td>${r.h}h ${r.m}m</td>
<td class="no-print">
<button class="danger" onclick="borrarRegistro(${index})">🗑</button>
</td>

`

tabla.appendChild(tr)

total+=r.h*60+r.m

})

let th=Math.floor(total/60)
let tm=total%60

totalMes.innerText=th+"h "+tm+"m"

}

function borrarRegistro(i){

if(!confirm("¿Borrar registro?"))return

registros.splice(i,1)

localStorage.setItem("registros",JSON.stringify(registros))

mostrar()

}

function borrarPerfil(){

if(confirm("¿Eliminar cuenta y registros?")){

usuarios=usuarios.filter(u=>u!==usuario)
registros=registros.filter(r=>r.usuario!==usuario)

localStorage.setItem("usuarios",JSON.stringify(usuarios))
localStorage.setItem("registros",JSON.stringify(registros))

logout()

}

}

function exportarExcel(){

let mesSeleccionado = selectorMes.value

let datos=[["Fecha","Ingreso","Egreso","Horas"]]

registros.forEach(r=>{

if(r.usuario!==usuario)return
if(r.f.slice(0,7)!==mesSeleccionado)return

datos.push([r.f,r.i,r.e,r.h+"h "+r.m+"m"])

})

let wb=XLSX.utils.book_new()
let ws=XLSX.utils.aoa_to_sheet(datos)

XLSX.utils.book_append_sheet(wb,ws,"Horas")

XLSX.writeFile(wb,"horas_"+mesSeleccionado+".xlsx")

}

function imprimirPDF(){

window.print()

}

iniciar()

</script>

</body>
</html>
