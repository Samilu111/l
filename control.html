<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Control de Horas</title>

<style>

*{
box-sizing:border-box;
font-family:system-ui,-apple-system;
}

html,body{
margin:0;
max-width:100%;
overflow-x:hidden;
background:#f4f6fb;
color:#111;
transition:.3s;
line-height:1.4;
}

.dark{
background:#0f172a;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:30px 20px;
width:100%;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
font-size:14px;
}

.primary{
background:#4f46e5;
color:white;
}

.secondary{
background:#e5e7eb;
}

.danger{
background:#ef4444;
color:white;
}

.card{
background:white;
padding:22px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.dark .card{
background:#1e293b;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:12px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.table-wrap{
width:100%;
overflow-x:auto;
}

table{
width:100%;
min-width:450px;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#f1f5f9;
}

.total{
text-align:right;
font-weight:700;
margin-top:15px;
}

.center{
max-width:420px;
margin:auto;
margin-top:120px;
}

.link{
color:#4f46e5;
cursor:pointer;
font-weight:600;
}

/* IMPRESION PDF */

@media print{

body *{
visibility:hidden;
}

#printArea,#printArea *{
visibility:visible;
}

#printArea{
position:absolute;
left:0;
top:0;
width:100%;
background:white;
padding:20px;
}

#printArea table{
width:100%;
border-collapse:collapse;
}

#printArea th,
#printArea td{
border:1px solid black;
padding:8px;
text-align:center;
}

}

</style>
</head>

<body>

<div id="loginScreen" class="card center">

<h2>Iniciar sesión</h2>

<input id="loginNombre" placeholder="Nombre">
<input id="loginApellido" placeholder="Apellido">

<button class="primary" onclick="login()">Entrar</button>

<p>No tenés cuenta?
<span class="link" onclick="mostrarRegistro()">Registrarse</span>
</p>

</div>


<div id="registerScreen" class="card center" style="display:none">

<h2>Crear cuenta</h2>

<input id="regNombre" placeholder="Nombre">
<input id="regApellido" placeholder="Apellido">

<button class="primary" onclick="registrar()">Registrarse</button>

<p>¿Ya tenés cuenta?
<span class="link" onclick="mostrarLogin()">Iniciar sesión</span>
</p>

</div>


<div id="app" style="display:none">

<div class="container">

<div class="header">

<h1>Control de Horas</h1>

<div class="actions">

<span id="usuario"></span>

<button class="secondary" onclick="toggleDark()">Modo</button>
<button class="secondary" onclick="borrarPerfil()">Borrar Perfil</button>
<button class="danger" onclick="logout()">Salir</button>

</div>

</div>


<div class="card">

<h3>Cargar horas</h3>

<div class="grid">

<input type="date" id="fecha">
<input type="time" id="ingreso">
<input type="time" id="egreso">

</div>

<button class="primary" onclick="guardar()">Guardar registro</button>

</div>


<div class="card">

<h3>Registros por mes</h3>

<input type="month" id="selectorMes" onchange="mostrar()">

<div class="table-wrap">

<table id="tablaExcel">

<thead>
<tr>
<th>Fecha</th>
<th>Ingreso</th>
<th>Egreso</th>
<th>Horas</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

<div class="total">
Total del mes: <span id="totalMes">0h 0m</span>
</div>

<br>

<button class="primary" onclick="exportarPDF()">Exportar PDF</button>

<button class="secondary" onclick="exportarExcel()">Exportar Excel</button>

</div>

</div>

</div>

<script>

let registros=JSON.parse(localStorage.getItem("registros"))||[]
let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[]
let usuario=null

let hoy=new Date()
let mesActual=hoy.toISOString().slice(0,7)

function cap(t){
return t.charAt(0).toUpperCase()+t.slice(1).toLowerCase()
}

function mostrarRegistro(){
loginScreen.style.display="none"
registerScreen.style.display="block"
}

function mostrarLogin(){
registerScreen.style.display="none"
loginScreen.style.display="block"
}

function registrar(){

let nombre=cap(regNombre.value)+" "+cap(regApellido.value)

usuarios.push(nombre)

localStorage.setItem("usuarios",JSON.stringify(usuarios))

alert("Cuenta creada")

mostrarLogin()

}

function login(){

let nombre=cap(loginNombre.value)+" "+cap(loginApellido.value)

if(!usuarios.includes(nombre)){
alert("Usuario no registrado")
return
}

usuario=nombre

localStorage.setItem("sesion",usuario)

iniciar()

}

function iniciar(){

usuario=localStorage.getItem("sesion")

if(!usuario)return

loginScreen.style.display="none"
registerScreen.style.display="none"
app.style.display="block"

selectorMes.value=mesActual

usuarioSpan=document.getElementById("usuario")
usuarioSpan.innerText="Usuario: "+usuario

mostrar()

}

function logout(){
localStorage.removeItem("sesion")
location.reload()
}

function minutos(h){
let p=h.split(":")
return p[0]*60+parseInt(p[1])
}

function guardar(){

let f=fecha.value
let i=ingreso.value
let e=egreso.value

let diff=minutos(e)-minutos(i)

if(diff<0) diff+=1440

let h=Math.floor(diff/60)
let m=diff%60

registros.push({usuario,f,i,e,h,m})

localStorage.setItem("registros",JSON.stringify(registros))

mostrar()

}

function borrar(i){

registros.splice(i,1)

localStorage.setItem("registros",JSON.stringify(registros))

mostrar()

}

function mostrar(){

tabla.innerHTML=""

let total=0

let mes=selectorMes.value

registros.forEach((r,i)=>{

if(r.usuario!==usuario)return
if(r.f.slice(0,7)!==mes)return

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.f}</td>
<td>${r.i}</td>
<td>${r.e}</td>
<td>${r.h}h ${r.m}m</td>
<td><button class="danger" onclick="borrar(${i})">Borrar</button></td>
`

tabla.appendChild(tr)

total+=r.h*60+r.m

})

let th=Math.floor(total/60)
let tm=total%60

totalMes.innerText=th+"h "+tm+"m"

}

function borrarPerfil(){

usuarios=usuarios.filter(u=>u!==usuario)
registros=registros.filter(r=>r.usuario!==usuario)

localStorage.setItem("usuarios",JSON.stringify(usuarios))
localStorage.setItem("registros",JSON.stringify(registros))

logout()

}

function toggleDark(){

document.body.classList.toggle("dark")

localStorage.setItem("dark",document.body.classList.contains("dark"))

}

if(localStorage.getItem("dark")=="true"){
document.body.classList.add("dark")
}

iniciar()


/* EXPORTAR PDF */

function exportarPDF(){

let mes=selectorMes.value

let fecha=new Date(mes+"-01")

let nombreMes=fecha.toLocaleDateString("es-ES",{month:"long",year:"numeric"})

let total=0

let html=`
<div id="printArea">

<h2 style="text-align:center">Historial de horas</h2>
<h3 style="text-align:center">${usuario}</h3>
<h4 style="text-align:center">Mes: ${nombreMes}</h4>

<table>

<tr>
<th>Fecha</th>
<th>Ingreso</th>
<th>Egreso</th>
<th>Horas</th>
</tr>
`

registros.forEach(r=>{

if(r.usuario!==usuario) return
if(r.f.slice(0,7)!==mes) return

html+=`
<tr>
<td>${r.f}</td>
<td>${r.i}</td>
<td>${r.e}</td>
<td>${r.h}h ${r.m}m</td>
</tr>
`

total+=r.h*60+r.m

})

let th=Math.floor(total/60)
let tm=total%60

html+=`
</table>

<h3 style="text-align:right">
Total del mes: ${th}h ${tm}m
</h3>

</div>
`

let div=document.createElement("div")
div.innerHTML=html
document.body.appendChild(div)

window.print()

div.remove()

}


/* EXPORTAR EXCEL */

function exportarExcel(){

let tabla=document.getElementById("tablaExcel")

let wb=XLSX.utils.table_to_book(tabla,{sheet:"Horas"})

XLSX.writeFile(wb,"horas_trabajadas.xlsx")

}

</script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</body>
</html>
